<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nullclines and Vector Fields</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script defer src="nullclineDeathRate.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .row {
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    .block {
      flex: 1 1 0;
      min-width: 0;
      border: 1px solid #ccc;
      padding: 12px;
      border-radius: 6px;
      background: #fff;
    }
    .equation {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.05rem;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-content: flex-start;
    }
    .controls label {
      margin-right: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .controls label.checkbox {
      flex-direction: row;
      align-items: center;
      gap: 8px;
      min-width: 100%;
    }
    .controls input {
      max-width: 140px;
    }
    .plot svg {
      width: 100%;
      height: 400px;
      display: block;
      background: #fafafa;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .plot-title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .legend {
      font-size: 0.9em;
      text-align: center;
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="row">
  <div class="block equation">
    <div>
      \[
      \begin{aligned}
      \frac{dx}{dt} &= r x \left(1 - \frac{x}{K_i}\right) - x y \\
      \frac{dy}{dt} &= x y - \gamma_i y
      \end{aligned}
      \]
    </div>
    <div class="legend">
      <span style="color: blue; padding-right: 10px;">&#9632; x-nullcline </span> 
      <span style="color: red;">&#9632; y-nullcline</span>
    </div>
  </div>

  <div class="block controls">
    <label>r:
      <input id="r" type="number" value="1.0" step="0.01">
    </label>

    <label>K₁:
      <input id="k1" type="number" value="1.0" step="0.1">
    </label>

    <label>K₂:
      <input id="k2" type="number" value="2.0" step="0.1">
    </label>

    <label>gamma₂:
      <input id="gamma2" type="number" value="2.0" step="0.1">
    </label>

    <label>x₀:
      <input id="x0" type="number" value="1.9" step="0.05">
    </label>

    <label>y₀:
      <input id="y0" type="number" value="0.1" step="0.01">
    </label>

    <label class="checkbox">
      <input id="propLength" type="checkbox">
      <span>Proportional arrow lengths</span>
    </label>

    <label class="checkbox">
      <input id="showSim" type="checkbox">
      <span>Show static trajectory</span>
    </label>
  </div>
</div>

<div class="row">
  <div class="block plot">
    <div class="plot-title">Environment 1 Phase Plane</div>
    <svg id="plot1" width="600" height="400"></svg>
  </div>

  <div class="block plot">
    <div class="plot-title">Environment 2 Phase Plane</div>
    <svg id="plot2" width="600" height="400"></svg>
  </div>
</div>

</body>
</html>
