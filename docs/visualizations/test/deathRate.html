<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Switching Environments</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script defer src="deathRate.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .row {
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    .block {
      flex: 1 1 0;
      min-width: 0;
      border: 1px solid #ccc;
      padding: 12px;
      border-radius: 6px;
      background: #fff;
    }
    .equation {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      text-align: center;
      font-size: 1.05rem;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-content: flex-start;
    }
    .controls label {
      margin-right: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .controls label.checkbox {
      flex-direction: row;
      align-items: center;
      gap: 8px;
      min-width: 100%;
    }
    .controls input {
      max-width: 140px;
    }
    .controls button {
      align-self: end;
      padding: 6px 12px;
    }
    .plot svg {
      width: 100%;
      height: 300px;
      display: block;
      background: #fafafa;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div class="row">
  <div class="block equation">
    <div>
      \[
      \begin{aligned}
      \frac{dx}{dt} &= r x \left(1 - \frac{x}{K_i}\right) - x y \\
      \frac{dy}{dt} &= x y - \gamma_i y
      \end{aligned}
      \]
    </div>
  </div>

  <div class="block controls">
    <label>Switching frequency:
      <input id="freq" type="number" value="0.5" step="0.05">
    </label>

    <label>r:
      <input id="r" type="number" value="1.0" step="0.01">
    </label>

    <label>K₁:
      <input id="k1" type="number" value="1.0" step="0.1">
    </label>

    <label>K₂:
      <input id="k2" type="number" value="2.0" step="0.1">
    </label>

    <label>gamma₁:
      <input id="gamma1" type="number" value="1.0" step="0.1" readonly>
    </label>

    <label>gamma₂:
      <input id="gamma2" type="number" value="2.0" step="0.1">
    </label>

    <label>x₀:
      <input id="x0" type="number" value="1.0" step="0.1">
    </label>

    <label>y₀:
      <input id="y0" type="number" value="0.1" step="0.01">
    </label>

    <label>Total time:
      <input id="Ttotal" type="number" value="200" step="10">
    </label>

    <label class="checkbox">
      <input id="startInA" type="checkbox" checked>
      <span>Start in environment A?</span>
    </label>

    <button id="runBtn">Run</button>
  </div>
</div>

<div class="row">
  <div class="block plot">
    <h3>Time series</h3>
    <svg id="timeseries" width="800" height="300"></svg>
  </div>

  <div class="block plot">
    <h3>Phase portrait</h3>
    <svg id="phase" width="800" height="300"></svg>
  </div>
</div>

</body>
</html>
