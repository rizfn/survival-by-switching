<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flow fields: 3 param LV</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 30px; left: 30px;
      z-index: 10;
    }
    .env-indicator {
      font-size: 2.5rem;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,1);
      pointer-events: none;
    }
    .hint {
      font-size: 1.1rem;
      opacity: 0.6;
      margin-top: 8px;
    }
    #toggle-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: #aaa;
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      display: inline-block;
    }
    #toggle-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    kbd {
      background-color: #333;
      border: 1px solid #777;
      border-radius: 4px;
      box-shadow: 0px 2px 0px rgba(0,0,0,0.5), inset 0px 1px 1px rgba(255,255,255,0.3);
      color: #eee;
      display: inline-block;
      font-size: 0.8em;
      font-family: monospace;
      padding: 2px 6px;
      margin: 0 2px;
      line-height: 1.2;
      vertical-align: middle;
    }
    #time-controls {
      display: none;
      margin-top: 15px;
    }
    .time-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: #aaa;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
      display: inline-block;
      margin-right: 8px;
      font-size: 1.0rem;
    }
    .time-btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="env-indicator" id="env-text">Environment 1</div>
    <div style="margin-top: 10px;">
      <button id="toggle-btn" class="hint" style="margin-top: 0; opacity: 1;">Toggle <kbd>␣</kbd></button>
    </div>
    <div id="time-controls">
        <button id="btn-t-plus" class="time-btn">t+ <kbd>↑</kbd> <kbd>W</kbd></button>
        <button id="btn-t-minus" class="time-btn">t- <kbd>↓</kbd> <kbd>S</kbd></button>
    </div>
  </div>
  <div id="label-1" style="position: absolute; transform: translate(-50%, 0); color: rgba(255,255,255,0.9); font-family: monospace; font-size: 32px; pointer-events: none; z-index: 10;">(1, 0)</div>
  <div id="label-2" style="position: absolute; transform: translate(-50%, 0); color: rgba(255,255,255,0.9); font-family: monospace; font-size: 32px; pointer-events: none; z-index: 10;">(2, 0)</div>
  <canvas id="canvas"></canvas>
  <script src="index.js"></script>
</body>
</html>
